name: QA Check

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        default: "20"
      fail_on:
        description: "Fail on error or warning"
        required: false
        default: "error"
        type: choice
        options:
          - error
          - warning
      report_dir:
        description: "Report output folder"
        required: false
        default: "reports"

permissions:
  contents: read

env:
  NODE_VERSION: ${{ inputs.node_version || '20' }}
  FAIL_ON: ${{ inputs.fail_on || 'error' }}
  REPORT_DIR: ${{ inputs.report_dir || 'reports' }}

jobs:
  qa-check:
    name: Run QA Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install project dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found."
            exit 1
          fi

      - name: Debug Environment
        shell: bash
        run: |
          echo "========== DEBUG =========="
          echo "Node Version:"
          node -v

          echo ""
          echo "NPM Version:"
          npm -v

          echo ""
          echo "NPX Version:"
          npx -v

          echo ""
          echo "Current Directory:"
          pwd

          echo ""
          echo "Repository Files:"
          ls -la

          echo ""
          echo "Package:"
          cat package.json

          echo ""
          echo "==========================="

      - name: Run QA Check CLI
        id: qa
        shell: bash
        run: |
          set +e

          echo "========== RUNNING QA CHECK =========="

          echo "Trying package..."
          npx --yes qa-check-cli --version

          echo ""
          echo "Running QA..."
          npx --yes qa-check-cli . --ci --pdf --fail-on "${FAIL_ON}" --output "${REPORT_DIR}" 2>&1 | tee qa-output.log

          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "========== QA OUTPUT =========="
          cat qa-output.log
          echo "================================"

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "QA Exit Code: ${EXIT_CODE}"

          exit 0

      - name: Detect generated reports
        id: reports
        if: always()
        shell: bash
        run: |
          if [ -d "${REPORT_DIR}" ] && [ "$(find "${REPORT_DIR}" -type f | wc -l)" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reports found."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No reports found."
          fi

      - name: Upload QA Reports
        if: always() && steps.reports.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: qa-check-reports
          path: |
            ${{ env.REPORT_DIR }}/index.html
            ${{ env.REPORT_DIR }}/report.json
            ${{ env.REPORT_DIR }}/report.pdf
            ${{ env.REPORT_DIR }}/screenshots/**
          if-no-files-found: warn

      - name: Fail workflow when QA threshold is not met
        if: always() && steps.qa.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "QA Check failed with exit code ${{ steps.qa.outputs.exit_code }}"
          exit "${{ steps.qa.outputs.exit_code }}"